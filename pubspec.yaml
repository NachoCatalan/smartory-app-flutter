name: smartory_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.4

dependencies:
  audioplayers: ^6.6.0
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  google_mlkit_text_recognition: ^0.15.1
  jwt_decoder: ^2.0.1
  mobile_scanner: ^7.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  record: ^6.2.0
  shimmer: ^3.0.0
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo/splash_logo.png
  fullscreen: true

  android_12:
    image: assets/logo/splash_logo.png
    color: "#FFFFFF"

flutter:
  assets:
    - .env
  uses-material-design: true
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Italic-VariableFont_wght.ttf
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf

